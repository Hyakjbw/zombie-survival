<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mini DayZ Web - Test Kết Nối</title>
    <script src="https://unpkg.com/colyseus.js@^0.15.0/dist/colyseus.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #2c3e50; color: white; }
        #status { font-size: 24px; font-weight: bold; color: #f39c12; margin-top: 20px;}
    </style>
</head>
<body>
    <h1>Thử Nghiệm Sinh Tồn Online</h1>
    <p>Hệ thống đang gọi đến máy chủ PikaMC...</p>
    <div id="status">Đang chờ kết nối...</div>

    <script>
        // Địa chỉ IP và Port từ host của bạn
        const client = new Colyseus.Client('ws://180.93.103.158:25808');

        // Yêu cầu máy chủ cho phép vào phòng "survival"
        client.joinOrCreate("survival").then(room => {
            // Nếu kết nối thành công, đổi chữ thành màu xanh lá
            document.getElementById("status").innerText = "Đã kết nối thành công vào game!";
            document.getElementById("status").style.color = "#2ecc71";
            
        }).catch(e => {
            // Nếu lỗi, đổi chữ thành màu đỏ và báo lỗi
            document.getElementById("status").innerText = "Kết nối thất bại. Lỗi: " + e;
            document.getElementById("status").style.color = "#e74c3c";
        });
    </script>
</body>
</html>
